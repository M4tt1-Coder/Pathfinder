repos:
  - repo: local
    hooks:
      - id: rust-fmt
        name: rustfmt (cargo fmt --check)
        entry: cargo fmt --all -- --check
        language: system
        pass_filenames: false

      - id: rust-clippy
        name: clippy (deny warnings)
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        pass_filenames: false

      - id: rust-test
        name: cargo test
        entry: cargo test --all-features
        language: system
        pass_filenames: false

      # Optional: catch dependency/security issues
      - id: rust-audit
        name: cargo audit
        entry: cargo audit
        language: system
        pass_filenames: false
        stages: [manual] # run manually, not every commit
